<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Calorie Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <h1>Vitals Engine</h1>
        <select id="unit"><option value="metric">Metric (kg/cm)</option><option value="imperial">Imperial (lbs/in)</option></select>
        <input type="number" id="weight" placeholder="Weight">
        <input type="number" id="height" placeholder="Height">
        <input type="number" id="age" placeholder="Age">
        <select id="gender"><option value="male">Male</option><option value="female">Female</option></select>
        <select id="activity">
            <option value="running_6mph">Running (6mph)</option>
            <option value="cycling_moderate">Cycling</option>
            <option value="weightlifting_vigorous">Weightlifting</option>
        </select>
        <input type="number" id="duration" placeholder="Duration (min)">
        
        <div class="btn-grid">
            <button class="prime" onclick="calculate()">Analyze</button>
            <button onclick="convertUnits()">Toggle Units</button>
        </div>
        <div id="result" class="result-display">Ready for Input</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
